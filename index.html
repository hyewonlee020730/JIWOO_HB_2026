<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=414px, initial-scale=1.0" />
  <title>지우 생일 축하해</title>
  <style>
    :root {
      --color-bg: #F9F8F6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
    }

    body {
      width: 414px;
      margin: 0 auto;
      background: #fff;
      font-family: sans-serif;
    }

    /* Section 공통 */
    .section {
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      scroll-margin-top: 37px;
    }

    /* Section 1 */
    .section-1 {
      background: #fff;
    }

    /* GNB */
    .gnb {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      height: 37px;
      background-color: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
    }

    .gnb__title-icon img {
      display: block;
      height: 20px;
    }

    .gnb__menu-icon img {
      display: block;
      height: 20px;
    }
  </style>
</head>
<body>

  <header class="gnb">
    <div class="gnb__title-icon">
      <img src="assets/Page_asset/Title_Icon.png" alt="Title" />
    </div>
    <div class="gnb__menu-icon">
      <img src="assets/Page_asset/menu_icon.svg" alt="Menu" />
    </div>
  </header>

  <main>
    <section class="section section-1"></section>
  </main>

</body>
</html>
