<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>지우야! 생일 축하해!!</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="지우야! 생일 축하해!!" />
  <meta property="og:description" content="지우의 생일을 기념해 만든 웹페이지" />
  <meta property="og:image" content="https://jiwoo-hb-2026.vercel.app/assets/thumbnail.png" />
  <style>
    @font-face {
      font-family: 'BMKkubulim';
      src: url('assets/BMKkubulim.woff2') format('woff2'),
           url('assets/BMKkubulimTTF.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --color-bg: #F9F8F6;
      --font-size-base: 16px;
      --gnb-height: calc(40px + env(safe-area-inset-top));
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      width: 100%;
      min-width: 375px;
      max-width: 390px;
      margin: 0 auto;
      font-family: sans-serif;
    }

    #snap-container {
      will-change: transform;
      transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
    }

    /* GNB */
    .gnb {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: 100%;
      max-width: 390px;
      min-width: 375px;
      height: var(--gnb-height);
      background-color: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top) 15px 0 15px;
    }

    .gnb__title-icon img {
      display: block;
      height: 20px;
    }

    .gnb__menu-icon img {
      display: block;
      height: 20px;
    }

    /* Section 공통 */
    .section {
      width: 100%;
      height: 100dvh;
      padding-top: var(--gnb-height);
    }

    /* Section 1 */
    .section-1 {
      background: var(--color-bg);
    }

    .section-1__frame {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 30px 0 calc(30px + env(safe-area-inset-bottom)) 0;
    }

    .section-1__text {
      font-family: 'BMKkubulim', sans-serif;
      font-size: var(--font-size-base);
      line-height: 1.6;
      color: #000;
      white-space: pre-line;
      text-align: center;
    }

    .section-1__cal img {
      display: block;
      width: 100%;
    }

    .section-1__arrow {
      display: flex;
      justify-content: center;
    }

    .section-1__arrow img {
      display: block;
      height: 40px;
    }

    /* Section 2 */
    .section-2 {
      background: var(--color-bg);
    }
  </style>
</head>
<body>

  <header class="gnb">
    <div class="gnb__title-icon">
      <img src="assets/Page_asset/Title_Icon.png" alt="Title" />
    </div>
    <div class="gnb__menu-icon">
      <img src="assets/Page_asset/menu_icon.svg" alt="Menu" />
    </div>
  </header>

  <main>
    <div id="snap-container">
      <section class="section section-1">
        <div class="section-1__frame">
          <div class="section-1__text">생일 축하해 지우야! 나는 혜원이야
너를 위해 준비한 이벤트 재밌게 보길 바래</div>
          <div class="section-1__cal">
            <img src="assets/Page_asset/section_1_cal.svg" alt="calendar" />
          </div>
          <div class="section-1__arrow">
            <img src="assets/Page_asset/arrow_down_btn.svg" alt="scroll down" />
          </div>
        </div>
      </section>
      <section class="section section-2"></section>
    </div>
  </main>

  <script>
    (function () {
      const container = document.getElementById('snap-container');
      const sections = Array.from(container.querySelectorAll('.section'));
      const total = sections.length;
      let current = 0;
      let isAnimating = false;

      function goTo(index) {
        if (index < 0 || index >= total || isAnimating) return;
        isAnimating = true;
        current = index;
        container.style.transform = `translateY(calc(-${current} * 100dvh))`;
      }

      container.addEventListener('transitionend', () => {
        isAnimating = false;
      });

      /* ── 휠 ── */
      window.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY > 0) goTo(current + 1);
        else if (e.deltaY < 0) goTo(current - 1);
      }, { passive: false });

      /* ── 터치 ── */
      let touchStartY = 0;
      window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      window.addEventListener('touchend', (e) => {
        const delta = touchStartY - e.changedTouches[0].clientY;
        if (Math.abs(delta) < 30) return; // 너무 짧은 스와이프 무시
        if (delta > 0) goTo(current + 1);
        else goTo(current - 1);
      }, { passive: true });

      /* ── 키보드 ── */
      window.addEventListener('keydown', (e) => {
        if (['ArrowDown', 'PageDown'].includes(e.key)) { e.preventDefault(); goTo(current + 1); }
        if (['ArrowUp', 'PageUp'].includes(e.key))   { e.preventDefault(); goTo(current - 1); }
      });
    })();
  </script>

</body>
</html>
