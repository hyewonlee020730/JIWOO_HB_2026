<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>지우야! 생일 축하해!!</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="지우야! 생일 축하해!!" />
  <meta property="og:description" content="지우의 생일을 기념해 만든 웹페이지" />
  <meta property="og:image" content="https://jiwoo-hb-2026.vercel.app/assets/thumbnail.png" />
  <style>
    @font-face {
      font-family: 'BMKkubulim';
      src: url('assets/BMKkubulim.woff2') format('woff2'),
           url('assets/BMKkubulimTTF.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --color-bg: #F9F8F6;
      --font-size-base: 16px;
      --gnb-height: calc(55px + env(safe-area-inset-top));
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      width: 100%;
      min-width: 375px;
      max-width: 390px;
      margin: 0 auto;
      font-family: sans-serif;
    }

    #snap-container {
      will-change: transform;
      transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
    }

    /* GNB */
    .gnb {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: 100%;
      max-width: 390px;
      min-width: 375px;
      height: var(--gnb-height);
      background-color: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top) 15px 0 15px;
    }

    .gnb__title-icon img {
      display: block;
      height: 28px;
    }

    .gnb__menu-icon img {
      display: block;
      height: 28px;
    }

    /* Section 공통 */
    .section {
      width: 100%;
      height: 100dvh;
      padding-top: var(--gnb-height);
    }

    /* Section 1 */
    .section-1 {
      background: var(--color-bg);
    }

    .section-1__frame {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 30px 0 calc(30px + env(safe-area-inset-bottom)) 0;
    }

    .section-1__text {
      font-family: 'BMKkubulim', sans-serif;
      font-size: var(--font-size-base);
      line-height: 1.6;
      color: #000;
      white-space: pre-line;
      text-align: center;
    }

    .section-1__cal img {
      display: block;
      width: 100%;
    }

    .section-1__arrow {
      display: flex;
      justify-content: center;
    }

    .section-1__arrow img {
      display: block;
      height: 40px;
    }

    /* Section 2 */
    .section-2 {
      background: var(--color-bg);
    }

    .section-2__frame {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 30px 0 calc(30px + env(safe-area-inset-bottom)) 0;
    }

    .section-2__text {
      font-family: 'BMKkubulim', sans-serif;
      font-size: var(--font-size-base);
      line-height: 1.6;
      color: #000;
      white-space: pre-line;
      text-align: center;
    }

    .section-2__card {
      padding: 0 30px;
      perspective: 1000px;
    }

    .card-flip {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      cursor: pointer;
    }

    .card-flip.flipped {
      transform: rotateY(180deg);
    }

    .card-flip__front,
    .card-flip__back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-flip__front img,
    .card-flip__back img {
      display: block;
      width: 100%;
    }

    .card-flip__back {
      position: absolute;
      inset: 0;
      transform: rotateY(180deg);
    }

    .section-2__bottom {
      display: flex;
      flex-direction: column;
    }

    .section-2__tooltip {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 18px;
      height: 80px;
    }

    .section-2__tooltip img {
      display: block;
      height: 32px;
      width: auto;
    }

    .section-2__btn {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 0 18px;
      height: 80px;
    }

    .section-2__btn svg {
      display: block;
      width: 100%;
      height: auto;
      cursor: pointer;
    }

    .section-2__btn:active .btn-bg  { fill: #DBF6FF; }
    .section-2__btn:active .btn-text { fill: #505050; }
  </style>
</head>
<body>

  <header class="gnb">
    <div class="gnb__title-icon">
      <img src="assets/Page_asset/Title_Icon.png" alt="Title" />
    </div>
    <div class="gnb__menu-icon">
      <img src="assets/Page_asset/menu_icon.svg" alt="Menu" />
    </div>
  </header>

  <main>
    <div id="snap-container">
      <section class="section section-1">
        <div class="section-1__frame">
          <div class="section-1__text">생일 축하해 지우야! 나는 혜원이야
너를 위해 준비한 이벤트 재밌게 보길 바래</div>
          <div class="section-1__cal">
            <img src="assets/Page_asset/section_1_cal.svg" alt="calendar" />
          </div>
          <div class="section-1__arrow">
            <img src="assets/Page_asset/arrow_down_btn.svg" alt="scroll down" />
          </div>
        </div>
      </section>
      <section class="section section-2">
        <div class="section-2__frame">
          <div class="section-2__text">혜원이가
준비한 생일 축하카드</div>
          <div class="section-2__card">
            <div class="card-flip" id="sec2Card">
              <div class="card-flip__front">
                <img src="assets/Page_asset/card_1.png" alt="카드 앞면" />
              </div>
              <div class="card-flip__back">
                <img src="assets/Page_asset/card2.png" alt="카드 뒷면" />
              </div>
            </div>
          </div>
          <div class="section-2__bottom">
            <div class="section-2__tooltip" id="sec2Tooltip">
              <img src="assets/Page_asset/tooltip.svg" alt="카드를 눌러봐!" height="32" />
            </div>
            <div class="section-2__btn" id="sec2Btn">
              <svg width="756" height="100" viewBox="0 0 756 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="btn-bg" d="M0 18.0615C0 8.08642 8.08642 0 18.0615 0H737.692C747.667 0 755.754 8.08642 755.754 18.0615V81.2769C755.754 91.252 747.667 99.3384 737.692 99.3384H18.0615C8.0864 99.3384 0 91.252 0 81.2769V18.0615Z" fill="#A8D6E6"/>
                <path class="btn-text" d="M349.572 57.4289V59.8674H324.261V57.4289H335.404V51.7494H327.163V37.5198H330.095V42.2733H343.676V37.5198H346.578V51.7494H338.306V57.4289H349.572ZM330.095 49.3727H343.676V44.65H330.095V49.3727ZM374.605 35.6369V63.3553H371.704V48.4775H366.641V46.039H371.704V35.6369H374.605ZM365.005 38.1371V48.0145H355.529V54.3113C359.943 54.2959 363.339 54.1416 367.197 53.4471L367.444 55.8547C363.308 56.5955 359.666 56.7498 354.789 56.7807H352.597V45.6378H362.166V40.5139H352.535V38.1371H365.005ZM400.441 35.6369V46.6564H404.731V49.0948H400.441V63.2627H397.508V35.6369H400.441ZM393.218 38.5384C393.187 46.5329 389.668 53.6631 380.562 58.1697L378.926 55.8856C385.856 52.4285 389.622 47.428 390.224 40.9769H380.315V38.5384H393.218ZM429.209 35.6369V63.2936H426.245V35.6369H429.209ZM420.967 38.6001C420.967 46.6872 417.51 53.7249 408.034 58.2623L406.491 55.8856C413.852 52.3822 417.433 47.3972 418.004 40.946H407.818V38.6001H420.967Z" fill="black"/>
              </svg>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const container = document.getElementById('snap-container');
      const sections = Array.from(container.querySelectorAll('.section'));
      const total = sections.length;
      let current = 0;
      let isAnimating = false;

      function goTo(index) {
        if (index < 0 || index >= total || isAnimating) return;
        isAnimating = true;
        current = index;
        container.style.transform = `translateY(calc(-${current} * 100dvh))`;
      }

      container.addEventListener('transitionend', () => {
        isAnimating = false;
      });

      /* ── 휠 ── */
      window.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY > 0) goTo(current + 1);
        else if (e.deltaY < 0) goTo(current - 1);
      }, { passive: false });

      /* ── 터치 ── */
      let touchStartY = 0;
      window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      window.addEventListener('touchend', (e) => {
        const delta = touchStartY - e.changedTouches[0].clientY;
        if (Math.abs(delta) < 30) return; // 너무 짧은 스와이프 무시
        if (delta > 0) goTo(current + 1);
        else goTo(current - 1);
      }, { passive: true });

      /* ── 키보드 ── */
      window.addEventListener('keydown', (e) => {
        if (['ArrowDown', 'PageDown'].includes(e.key)) { e.preventDefault(); goTo(current + 1); }
        if (['ArrowUp', 'PageUp'].includes(e.key))   { e.preventDefault(); goTo(current - 1); }
      });

      /* ── Section 2 카드 플립 ── */
      const sec2Card    = document.getElementById('sec2Card');
      const sec2Tooltip = document.getElementById('sec2Tooltip');
      const sec2Btn     = document.getElementById('sec2Btn');
      if (sec2Card) {
        sec2Card.addEventListener('click', function () {
          const flipped = this.classList.toggle('flipped');
          sec2Tooltip.style.display = flipped ? 'none' : 'flex';
          sec2Btn.style.display     = flipped ? 'flex' : 'none';
        });
      }

      if (sec2Btn) {
        sec2Btn.addEventListener('click', () => {
          window.location.href = 'card-detail.html';
        });
      }
    })();
  </script>

</body>
</html>
