<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>지우야! 생일 축하해!!</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="지우야! 생일 축하해!!" />
  <meta property="og:description" content="지우의 생일을 기념해 만든 웹페이지" />
  <meta property="og:image" content="https://jiwoo-hb-2026.vercel.app/assets/thumbnail.png" />
  <style>
    @font-face {
      font-family: 'BMKkubulim';
      src: url('assets/BMKkubulim.woff2') format('woff2'),
           url('assets/BMKkubulimTTF.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --color-bg: #F9F8F6;
      --font-size-base: 16px;
      --gnb-height: calc(55px + env(safe-area-inset-top));
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      width: 100%;
      min-width: 375px;
      max-width: 390px;
      margin: 0 auto;
      font-family: sans-serif;
    }

    #snap-container {
      will-change: transform;
      transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
    }

    /* GNB */
    .gnb {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: 100%;
      max-width: 390px;
      min-width: 375px;
      height: var(--gnb-height);
      background-color: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top) 15px 0 15px;
    }

    .gnb__title-icon img {
      display: block;
      height: 28px;
    }

    .gnb__menu-icon img {
      display: block;
      height: 28px;
    }

    /* Section 공통 */
    .section {
      width: 100%;
      height: 100dvh;
      padding-top: var(--gnb-height);
    }

    /* Section 1 */
    .section-1 {
      background: var(--color-bg);
    }

    .section-1__frame {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 30px 0 calc(30px + env(safe-area-inset-bottom)) 0;
    }

    .section-1__text {
      font-family: 'BMKkubulim', sans-serif;
      font-size: var(--font-size-base);
      line-height: 1.6;
      color: #000;
      white-space: pre-line;
      text-align: center;
    }

    .section-1__cal img {
      display: block;
      width: 100%;
    }

    .section-1__arrow {
      display: flex;
      justify-content: center;
    }

    .section-1__arrow img {
      display: block;
      height: 40px;
    }

    /* Section 2 */
    .section-2 {
      background: var(--color-bg);
    }

    .section-2__frame {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 30px 0 calc(30px + env(safe-area-inset-bottom)) 0;
    }

    .section-2__text {
      font-family: 'BMKkubulim', sans-serif;
      font-size: var(--font-size-base);
      line-height: 1.6;
      color: #000;
      white-space: pre-line;
      text-align: center;
    }

    .section-2__card {
      padding: 0 30px;
      perspective: 1000px;
    }

    .card-flip {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      cursor: pointer;
    }

    .card-flip.flipped {
      transform: rotateY(180deg);
    }

    .card-flip__front,
    .card-flip__back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-flip__front img,
    .card-flip__back img {
      display: block;
      width: 100%;
    }

    .card-flip__back {
      position: absolute;
      inset: 0;
      transform: rotateY(180deg);
    }

    .section-2__bottom {
      display: flex;
      flex-direction: column;
    }

    .section-2__tooltip {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 18px;
      height: 80px;
    }

    .section-2__tooltip img {
      display: block;
      height: 32px;
      width: auto;
    }

    .section-2__btn {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 0 18px;
      height: 80px;
    }

    .section-2__btn svg {
      display: block;
      width: 100%;
      height: auto;
      cursor: pointer;
    }

    .section-2__btn:active .btn-bg  { fill: #DBF6FF; }
    .section-2__btn:active .btn-text { fill: #505050; }

    /* Section 3 */

      background: var(--color-bg);
    }

      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;

      font-size: var(--font-size-base);
      line-height: 1.6;
      color: #000;

      text-align: center;

    .section-3__card {
      padding: 0 30px;
    }

    .section-3__card img {
      display: block;
      width: 100%;
    }

    .section-3__bottom {
      display: flex;
      flex-direction: column;
    }

    .section-3__tooltip {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 18px;
      height: 80px;
    }

    .section-3__tooltip img {
      display: block;
      height: 32px;
      width: auto;
    }

    .section-3__btn {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 0 18px;
      height: 80px;
    }

    .section-3__btn svg {
      display: block;
      width: 100%;
      height: auto;
      cursor: pointer;
    }

    .section-3__btn:active .btn-bg  { fill: #DBF6FF; }
    .section-3__btn:active .btn-text { fill: #505050; }

  <!-- Blow Detector -->
  <script>
    const BlowDetector = (() => {
      /* ── Config ── */
      const CFG = {
        fftSize:              2048,
        smoothing:            0.5,
        blowThreshold:        38,   // RMS 임계값 (0~255)
        spectralFlatness:     0.28, // 1에 가까울수록 noise, 0에 가까울수록 tonal
        minDuration:          50,   // ms — 입김 최소 지속 시간
        cooldown:             800,  // ms — 감지 후 대기 시간
        freqLow:              80,   // Hz — 입김 주파수 하한
        freqHigh:             1200, // Hz — 입김 주파수 상한
      };

      let ctx = null, analyser = null, source = null, stream = null;
      let rafId  = null;
      let state  = 'idle'; // idle | listening | blowing | denied | error
      let data   = null;
      let blowStart     = null;
      let cooldownUntil = 0;

      const cb = { onBlowStart: null, onBlow: null, onBlowEnd: null };

      /* ── 마이크 권한 요청 (페이지 진입 시) ── */
      async function init() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        } catch (e) {
          state = (e.name === 'NotAllowedError') ? 'denied' : 'error';
          console.warn('[BlowDetector] init failed:', e.name);
        }
      }

      /* ── 주파수 bin 범위 계산 ── */
      function binRange() {
        const nyquist = ctx.sampleRate / 2;
        const bins    = analyser.frequencyBinCount;
        return {
          lo: Math.round(CFG.freqLow  / nyquist * bins),
          hi: Math.round(CFG.freqHigh / nyquist * bins),
        };
      }

      /* ── 분석 루프 ── */
      function analyze() {
        analyser.getByteFrequencyData(data);
        const { lo, hi } = binRange();
        const count = hi - lo;

        // RMS (입김 에너지)
        let rmsSum = 0;
        for (let i = lo; i < hi; i++) rmsSum += data[i] ** 2;
        const rms = Math.sqrt(rmsSum / count);

        // Spectral Flatness (목소리 vs 입김 구분)
        // — 입김: 브로드밴드 노이즈 → flatness 높음
        // — 목소리: 하모닉 피크 → flatness 낮음
        let logSum = 0, linSum = 0;
        for (let i = lo; i < hi; i++) {
          const v = data[i] + 1;
          logSum += Math.log(v);
          linSum += v;
        }
        const flatness = Math.exp(logSum / count) / (linSum / count);

        const now    = Date.now();
        const isBlow = rms > 1;

        if (isBlow && now > cooldownUntil) {
          if (blowStart === null) blowStart = now;
          if (now - blowStart >= CFG.minDuration && state !== 'blowing') {
            state = 'blowing';
            cb.onBlowStart?.();
          }
          if (state === 'blowing') cb.onBlow?.({ rms, flatness });
        } else {
          if (state === 'blowing') {
            state         = 'listening';
            cooldownUntil = now + CFG.cooldown;
            cb.onBlowEnd?.();
          }
          blowStart = null;
        }

        rafId = requestAnimationFrame(analyze);
      }

      /* ── 외부 API ── */
      function start() {
        if (!stream || state === 'denied' || state === 'error') return;

        // AudioContext를 터치 이벤트 시점에 생성 (iOS Safari 정책 대응)
        if (!ctx) {
          ctx      = new (window.AudioContext || window.webkitAudioContext)();
          analyser = ctx.createAnalyser();
          analyser.fftSize               = CFG.fftSize;
          analyser.smoothingTimeConstant = CFG.smoothing;
          source   = ctx.createMediaStreamSource(stream);
          source.connect(analyser);
          data = new Uint8Array(analyser.frequencyBinCount);
        }

        ctx.resume().then(() => {
          state     = 'listening';
          blowStart = null;
          analyze();
        });
      }

      function stop() {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        if (ctx)   ctx.suspend();
        if (state === 'blowing') cb.onBlowEnd?.();
        state     = 'idle';
        blowStart = null;
      }

      return {
        init,
        start,
        stop,
        on(event, fn) { cb[event] = fn; },
        get state()   { return state; },
      };
    })();

    /* ── 섹션 3 케이크 이미지 애니메이션 ── */
    const CAKE = {
      idle:    'assets/Page_asset/cake_img1.png',
      blowing: 'assets/Page_asset/cake_img2.gif',
      done:    'assets/Page_asset/cake_img3.png',
    };
    const BLOW_DONE_MS = 4000;

    let blowTimestamp = null;
    let blowDoneReached = false;

    function getCakeEl() { return document.getElementById('sec3Cake'); }

    BlowDetector.on('onBlowStart', () => {
      blowTimestamp = Date.now();
      const el = getCakeEl();
      if (el && !blowDoneReached) {
        // GIF를 처음부터 재생하려면 timestamp 쿼리 추가
        el.src = CAKE.blowing + '?' + Date.now();
      }
    });

    BlowDetector.on('onBlow', () => {
      if (blowDoneReached) return;
      if (blowTimestamp && Date.now() - blowTimestamp >= BLOW_DONE_MS) {
        blowDoneReached = true;
        const el = getCakeEl();
        if (el) el.src = CAKE.done;
      }
    });

    BlowDetector.on('onBlowEnd', () => {
      blowTimestamp = null;
      if (!blowDoneReached) {
        const el = getCakeEl();
        if (el) el.src = CAKE.idle;
      }
    });

    /* ── 페이지 진입 즉시 마이크 권한 요청 ── */
    BlowDetector.init();
  </script>

  <script>
    (function () {
      const container = document.getElementById('snap-container');
      const sections = Array.from(container.querySelectorAll('.section'));
      const total = sections.length;
      let current = 0;
      let isAnimating = false;

      const SEC3_INDEX = 2;

      function goTo(index) {
        if (index < 0 || index >= total || isAnimating) return;
        isAnimating = true;

        /* 섹션 3 진입/이탈 시 입김 감지 on/off */
        if (index === SEC3_INDEX)    BlowDetector.start();
        else if (current === SEC3_INDEX) BlowDetector.stop();

        current = index;
        container.style.transform = `translateY(calc(-${current} * 100dvh))`;
      }

      container.addEventListener('transitionend', () => {
        isAnimating = false;
      });

      /* ── 휠 ── */
      window.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY > 0) goTo(current + 1);
        else if (e.deltaY < 0) goTo(current - 1);
      }, { passive: false });

      /* ── 터치 ── */
      let touchStartY = 0;
      window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      window.addEventListener('touchend', (e) => {
        const delta = touchStartY - e.changedTouches[0].clientY;
        if (Math.abs(delta) < 30) return; // 너무 짧은 스와이프 무시
        if (delta > 0) goTo(current + 1);
        else goTo(current - 1);
      }, { passive: true });

      /* ── 키보드 ── */
      window.addEventListener('keydown', (e) => {
        if (['ArrowDown', 'PageDown'].includes(e.key)) { e.preventDefault(); goTo(current + 1); }
        if (['ArrowUp', 'PageUp'].includes(e.key))   { e.preventDefault(); goTo(current - 1); }
      });

      /* ── Section 2 카드 플립 ── */
      const sec2Card    = document.getElementById('sec2Card');
      const sec2Tooltip = document.getElementById('sec2Tooltip');
      const sec2Btn     = document.getElementById('sec2Btn');
      if (sec2Card) {
        sec2Card.addEventListener('click', function () {
          const flipped = this.classList.toggle('flipped');
          sec2Tooltip.style.display = flipped ? 'none' : 'flex';
          sec2Btn.style.display     = flipped ? 'flex' : 'none';
        });
      }

      if (sec2Btn) {
        sec2Btn.addEventListener('click', () => {
          window.location.href = 'card-detail.html';
        });
      }

    })();
  </script>
