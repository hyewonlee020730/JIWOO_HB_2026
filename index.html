<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>지우 생일 축하해</title>
  <style>
    @font-face {
      font-family: 'BMKkubulim';
      src: url('assets/BMKkubulim.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --color-bg: #F9F8F6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100dvh;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
    }

    body {
      width: 100%;
      min-width: 375px;
      max-width: 390px;
      margin: 0 auto;
      background: #fff;
      font-family: sans-serif;
    }

    /* Section 공통 */
    .section {
      width: 100%;
      height: calc(100dvh - 37px - env(safe-area-inset-top));
      scroll-snap-align: start;
    }

    /* Section 1 */
    .section-1 {
      background: var(--color-bg);
    }

    .section-1__frame {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 30px 0 calc(30px + env(safe-area-inset-bottom)) 0;
    }

    .section-1__text {
      font-family: 'BMKkubulim', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #000;
      white-space: pre-line;
      text-align: center;
    }

    .section-1__cal img {
      display: block;
      width: 100%;
    }

    .section-1__arrow {
      display: flex;
      justify-content: center;
    }

    .section-1__arrow img {
      display: block;
      height: 40px;
    }

    /* GNB */
    .gnb {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      height: calc(37px + env(safe-area-inset-top));
      background-color: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px 0 15px;
      padding-top: env(safe-area-inset-top);
    }

    .gnb__title-icon img {
      display: block;
      height: 20px;
    }

    .gnb__menu-icon img {
      display: block;
      height: 20px;
    }
  </style>
</head>
<body>

  <header class="gnb">
    <div class="gnb__title-icon">
      <img src="assets/Page_asset/Title_Icon.png" alt="Title" />
    </div>
    <div class="gnb__menu-icon">
      <img src="assets/Page_asset/menu_icon.svg" alt="Menu" />
    </div>
  </header>

  <main>
    <section class="section section-1">
      <div class="section-1__frame">
        <div class="section-1__text">생일 축하해 지우야! 나는 혜원이야
너를 위해 준비한 이벤트 재밌게 보길 바래</div>
        <div class="section-1__cal">
          <img src="assets/Page_asset/section_1_cal.svg" alt="calendar" />
        </div>
        <div class="section-1__arrow">
          <img src="assets/Page_asset/arrow_down_btn.svg" alt="scroll down" />
        </div>
      </div>
    </section>
  </main>

</body>
</html>
