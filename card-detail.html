<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>생일 축하카드 상세보기</title>
  <style>
    @font-face {
      font-family: 'BMKkubulim';
      src: url('assets/BMKkubulim.woff2') format('woff2'),
           url('assets/BMKkubulimTTF.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --color-bg: #F9F8F6;
      --color-bg2: #FFFFFF;
      --font-size-base: 16px;
      --gnb-height: calc(55px + env(safe-area-inset-top));
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100dvh;
    }

    body {
      width: 100%;
      min-width: 375px;
      max-width: 390px;
      margin: 0 auto;
      font-family: sans-serif;
      background: var(--color-bg2);
    }

    /* GNB */
    .gnb {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: 100%;
      max-width: 390px;
      min-width: 375px;
      height: var(--gnb-height);
      background-color: var(--color-bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top) 15px 0 15px;
    }

    .gnb__back {
      display: flex;
      align-items: center;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      flex: 0 0 20px;
    }

    .gnb__back img {
      display: block;
      height: 28px;
      width: auto;
    }

    .gnb__title {
      flex: 1;
      font-family: 'BMKkubulim', sans-serif;
      font-size: var(--font-size-base);
      color: #000;
      text-align: center;
    }

    .gnb__spacer {
      flex: 0 0 20px;
    }

    /* 콘텐츠 */
    .content {
      margin-top: var(--gnb-height);
      width: 100%;
      height: calc(100dvh - var(--gnb-height));
      overflow-y: auto;
      padding: 0 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .content img {
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>

  <header class="gnb">
    <button class="gnb__back" onclick="const b=document.getElementById('bgm');if(b)sessionStorage.setItem('bgm_time',b.currentTime);history.back()">
      <img src="assets/Page_asset/arrow-left_icon.svg" alt="뒤로가기" />
    </button>
    <span class="gnb__title">생일 축하 편지</span>
    <div class="gnb__spacer"></div>
  </header>

  <main class="content">
    <img src="assets/Page_asset/Cut1.png" alt="카드 1" />
    <img src="assets/Page_asset/Cut2.png" alt="카드 2" />
    <img src="assets/Page_asset/Cut3.png" alt="카드 3" />
    <img src="assets/Page_asset/Cut4.png" alt="카드 4" />
    <img src="assets/Page_asset/Cut5.png" alt="카드 5" />
    <img src="assets/Page_asset/Cut6.png" alt="카드 6" />
    <img src="assets/Page_asset/Cut7.png" alt="카드 7" />
  </main>

  <!-- 배경 음악 (이어서 재생) -->
  <audio id="bgm" src="assets/HB_audio.mp3" loop preload="auto"></audio>
  <script>
    (function () {
      const bgm = document.getElementById('bgm');
      let played = false;

      function play() {
        if (played) return;
        played = true;
        const saved = parseFloat(sessionStorage.getItem('bgm_time') || '0');
        // 오디오 로드 후 currentTime 설정
        if (bgm.readyState >= 1) {
          bgm.currentTime = saved;
          bgm.play().catch(() => {});
        } else {
          bgm.addEventListener('loadedmetadata', () => {
            bgm.currentTime = saved;
            bgm.play().catch(() => {});
          }, { once: true });
        }
      }

      // 데스크탑: 바로 시도
      play();

      // iOS: 첫 touchend / click 에서 재생 (가장 신뢰도 높은 제스처)
      document.addEventListener('touchend', play, { once: true });
      document.addEventListener('click',    play, { once: true });
    })();
  </script>

</body>
</html>
